<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INCIDENT REPORT 7734</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #00FF00;
            font-family: 'Press Start 2P', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateY(-20%);
        }

        .container {
            text-align: left;
            max-width: 600px;
            width: 90%;
        }

        .message {
            font-size: 24px;
            margin-bottom: 40px;
            min-height: 40px;
            word-wrap: break-word;
            line-height: 1.2;
            white-space: pre-wrap;
        }

        .input-wrapper {
            font-size: 20px;
            min-height: 30px;
        }

        .input-text {
            word-wrap: break-word;
            max-width: 500px;
            line-height: 1.2;
            display: inline;
        }

        .cursor {
            display: inline-block;
            width: 12px;
            height: 20px;
            background-color: #00FF00;
            animation: blink 0.7s infinite;
            vertical-align: text-bottom;
        }

        .pager-hint {
            opacity: 0.5;
            font-size: 13px;
        }

        @keyframes blink {
            0%, 49% { background-color: #00FF00; opacity: 1; }
            50%, 100% { background-color: #00FF00; opacity: 0; }
        }

        input {
            position: absolute;
            left: -9999px;
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="message" id="messageBox">CLASSIFIED TERMINAL - ACCESS GRANTED. IDENTIFY YOURSELF.</div>
        <div class="input-wrapper">
            <div class="input-text" id="inputText"><span class="cursor"></span></div>
        </div>
    </div>

    <input type="text" id="hiddenInput" autofocus>

    <script>
        const messageBox = document.getElementById('messageBox');
        const inputText = document.getElementById('inputText');
        const hiddenInput = document.getElementById('hiddenInput');

        let currentScene = 'start';
        let playerName = '';
        let unrecognizedCount = 0;
        let handlerOverrodeMessage = false;
        const explored = new Set();
        let sentencePager = null;
        let pagerAwaitingEnter = false;
        let twTimer = null;
        let twFull = '';
        let twDone = null;
        let continueMode = false;
        let pendingScene = null;

        function startTypewriter(text, onDone) {
            clearInterval(twTimer);
            twFull = text;
            twDone = onDone;
            messageBox.textContent = '';
            let i = 0;
            twTimer = setInterval(() => {
                messageBox.textContent = text.slice(0, ++i);
                if (i >= text.length) {
                    clearInterval(twTimer);
                    twTimer = null;
                    const cb = twDone;
                    twDone = null;
                    if (cb) cb();
                }
            }, 30);
        }

        function skipTypewriter() {
            if (!twTimer) return false;
            clearInterval(twTimer);
            twTimer = null;
            messageBox.textContent = twFull;
            const cb = twDone;
            twDone = null;
            if (cb) cb();
            return true;
        }

        function showPagerSentence() {
            const { sentences, index } = sentencePager;
            inputText.innerHTML = '';
            startTypewriter(sentences[index], () => {
                const isLast = index >= sentences.length - 1;
                if (!isLast) {
                    inputText.innerHTML = '<span class="pager-hint">[more - press enter to advance]</span>';
                } else {
                    sentencePager = null;
                    if (scenes[currentScene] && scenes[currentScene].autoAdvance) {
                        pagerAwaitingEnter = true;
                        inputText.innerHTML = '<span class="pager-hint">[more - press enter to advance]</span>';
                    } else {
                        inputText.innerHTML = '<span class="cursor"></span>';
                        hiddenInput.focus();
                    }
                }
            });
        }

        // Called by a handler to display a custom message and stay on current scene
        function setHint(text) {
            handlerOverrodeMessage = true;
            skipTypewriter();
            messageBox.textContent = text;
        }

        function showContinuePrompt(sceneKey) {
            pendingScene = sceneKey;
            continueMode = true;
            inputText.innerHTML = 'Continue? <span class="cursor"></span>';
            hiddenInput.focus();
        }

        function showCorrectFeedback(label, body, nextSceneKey) {
            handlerOverrodeMessage = true;
            skipTypewriter();
            messageBox.textContent = label;
            setTimeout(() => {
                startTypewriter(body, () => showContinuePrompt(nextSceneKey));
            }, 600);
        }

        function detectIntent(input, keywords) {
            return keywords.some(kw => input.includes(kw));
        }

        function levenshtein(a, b) {
            const m = a.length, n = b.length;
            const dp = [];
            for (let i = 0; i <= m; i++) { dp[i] = [i]; for (let j = 1; j <= n; j++) dp[i][j] = 0; }
            for (let j = 0; j <= n; j++) dp[0][j] = j;
            for (let i = 1; i <= m; i++)
                for (let j = 1; j <= n; j++)
                    dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] :
                        1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
            return dp[m][n];
        }

        function fuzzyWord(text, kw) {
            if (text.includes(kw)) return true;
            if (kw.includes(' ')) return false;
            const words = text.split(/\W+/);
            const tol = Math.max(1, Math.floor(kw.length / 5));
            return words.some(w => w.length >= 3 && kw.length >= 4 && levenshtein(w, kw) <= tol);
        }

        function fuzzyDetect(text, keywords) {
            return keywords.some(kw => fuzzyWord(text, kw));
        }

        function scoreGroups(input, groups) {
            return groups.filter(g => fuzzyDetect(input, g)).length;
        }

        const qAttempts = {};

        let pwPhase = 0;
        let pwIntervalId = null;

        const pwPhases = [
            { accept: 'the correct password', hint: 'Enter the correct password' },
            { accept: 'harder',               hint: 'the password is harder' },
            { accept: 'encrypted',            hint: 'the password is encrypted' }
        ];

        const pwTimeoutMessages = [
            'In order to log in, please enter the correct password.',
            'password timeout. the password has changed. the password is harder.',
            'password timeout. the password has changed. the password is encrypted.'
        ];

        function advancePwPhase() {
            if (currentScene !== 'password') { stopPwCycle(); return; }
            pwPhase = (pwPhase + 1) % 3;
            qAttempts.pw = 0;
            messageBox.textContent = pwTimeoutMessages[pwPhase];
        }

        function startPwCycle() {
            if (pwIntervalId) return;
            pwIntervalId = setInterval(advancePwPhase, 120000);
        }

        function stopPwCycle() {
            clearInterval(pwIntervalId);
            pwIntervalId = null;
            pwPhase = 0;
            qAttempts.pw = 0;
        }

        function analyzeAgreement(response) {
            const text = response.toLowerCase().trim();
            const agreementWords = ['yes', 'yeah', 'yep', 'yup', 'sure', 'okay', 'ok', 'fine', 'good', 'great',
                'love', 'loved', 'like', 'liked', 'enjoyed', 'fun', 'cool', 'awesome', 'amazing', 'nice',
                'absolutely', 'definitely', 'totally', 'understand', 'i do', 'i will', 'proceed'];
            const disagreementWords = ['no', 'nope', 'nah', 'never', 'hate', 'hated', 'annoying', 'bad',
                'terrible', 'awful', 'stupid', 'boring', 'waste', 'pointless', "don't", "won't", "can't"];
            let agreementScore = 0, disagreementScore = 0;
            agreementWords.forEach(w => { if (text.includes(w)) agreementScore++; });
            disagreementWords.forEach(w => { if (text.includes(w)) disagreementScore++; });
            if (agreementScore > disagreementScore) return { mood: 'agrees' };
            if (disagreementScore > agreementScore) return { mood: 'disagrees' };
            return { mood: 'neutral' };
        }

        function getHelpMessage(sceneKey) {
            if (sceneKey === 'hub_1') {
                if (!explored.has('victims_done') && !explored.has('source_done'))
                    return 'Type "victims" or "source" to choose a thread.';
                if (explored.has('victims_done'))
                    return 'One thread remains. Type "source".';
                return 'One thread remains. Type "victims".';
            }
            if (sceneKey === 'hub_2') {
                if (!explored.has('holt_done') && !explored.has('land_done'))
                    return 'Type "holt" or "land sale" to choose a lead.';
                if (explored.has('holt_done'))
                    return 'One lead remains. Type "land sale".';
                return 'One lead remains. Type "holt".';
            }
            if (sceneKey === 'hub_3') {
                if (!explored.has('crane_done') && !explored.has('board_done'))
                    return 'Type "crane" or "board" to choose a path.';
                if (explored.has('crane_done'))
                    return 'One path remains. Type "board".';
                return 'One path remains. Type "crane".';
            }
            const helpTexts = {
                q1_children:    'Answer the question. Think: cell division, organ development, body size, how children contact their environment.',
                q2_groundwater: 'Answer the question. Think: how water moves through soil, porosity, aquifers, how chemicals dissolve.',
                q3_limits:      'Answer the question. Think: how MCLs are set using dose-response data, what ppm means, who sets these limits, and what 400x the threshold means for real risk.',
                q4_superfund:   'Answer the question. Think: what Superfund/CERCLA is, cleanup methods, why remediation takes decades.',
                start:          'Type your name to identify yourself.',
                password:       'Enter the password to continue.',
                name_entry:     'Type "yes" to proceed or "no" to decline.',
                denied:         'Type "yes" to proceed.',
                warning:        'Type "yes" or "I understand".',
                briefing_1:     'Try: "what happened" or "tell me more".',
                victims_a:      'Press enter to advance through the text.',
                victims_a2:     'Press enter to advance.',
                source_b:       'Press enter to advance.',
                source_b2:      'Press enter to advance.',
                epa_link:       'Press enter to advance.',
                holt_a:         'Press enter to advance.',
                holt_a2:        'Press enter to advance.',
                land_b:         'Press enter to advance.',
                land_b2:        'Press enter to advance.',
                epa_deeper:     'Press enter to advance.',
                crane_a:        'Press enter to advance.',
                crane_a2:       'Press enter to advance.',
                board_b:        'Press enter to advance.',
                board_b2:       'Press enter to advance.',
                find_memo_intro:'Press enter to advance.',
                decision_point: 'Try: "report it" or "expose them" - or - "hide it" or "delete it".',
                confirm_expose: 'Type "yes" to publish or "no" to reconsider.',
                confirm_hide:   'Type "yes" to delete or "no" to reconsider.',
                ending_a:       'Type "restart" to begin again.',
                ending_b:       'Type "restart" to begin again.',
                ending_neutral: 'Type "restart" to begin again.',
            };
            return helpTexts[sceneKey] || 'Type "restart" to begin again.';
        }

        function transition(sceneKey) {
            continueMode = false;
            pendingScene = null;

            // Hub auto-advance when both branches are done
            if (sceneKey === 'hub_1' && explored.has('victims_done') && explored.has('source_done'))
                return transition('epa_link');
            if (sceneKey === 'hub_2' && explored.has('holt_done') && explored.has('land_done'))
                return transition('epa_deeper');
            if (sceneKey === 'hub_3' && explored.has('crane_done') && explored.has('board_done'))
                return transition('find_memo_intro');

            currentScene = sceneKey;
            unrecognizedCount = 0;
            skipTypewriter();
            sentencePager = null;
            pagerAwaitingEnter = false;
            const scene = scenes[sceneKey];
            let message = typeof scene.message === 'function' ? scene.message() : scene.message;
            if (Array.isArray(message)) {
                const sentences = message.map(s => s.replace('[name]', playerName));
                sentencePager = { sentences, index: 0 };
                showPagerSentence();
            } else if (typeof scene.message === 'function' || scene.instant) {
                messageBox.textContent = message.replace('[name]', playerName);
                inputText.innerHTML = '<span class="cursor"></span>';
                hiddenInput.focus();
            } else {
                inputText.innerHTML = '<span class="cursor"></span>';
                startTypewriter(message.replace('[name]', playerName), () => hiddenInput.focus());
            }
        }

        function handleScene(userInput) {
            const input = userInput.toLowerCase().trim();
            if (!input) return;

            if (input === 'help') {
                messageBox.textContent = continueMode
                    ? 'Type "yes" to continue to the next section, or wait and review.'
                    : getHelpMessage(currentScene);
                return;
            }

            if (continueMode) {
                const a = analyzeAgreement(input);
                if (a.mood === 'agrees') {
                    const next = pendingScene;
                    continueMode = false;
                    pendingScene = null;
                    transition(next);
                } else if (a.mood === 'disagrees') {
                    messageBox.textContent = 'Take your time. Type "yes" when you are ready to continue.';
                    inputText.innerHTML = 'Continue? <span class="cursor"></span>';
                } else {
                    unrecognizedCount++;
                    messageBox.textContent = unrecognizedCount >= 5
                        ? 'I don\'t recognize that input. Type "help" for assistance.'
                        : 'I don\'t recognize that input.';
                    inputText.innerHTML = 'Continue? <span class="cursor"></span>';
                }
                return;
            }

            handlerOverrodeMessage = false;
            const handler = scenes[currentScene] && scenes[currentScene].handler;
            if (!handler) return;

            const nextScene = handler(input);

            if (nextScene === null) {
                if (!handlerOverrodeMessage) {
                    unrecognizedCount++;
                    if (currentScene === 'decision_point' && unrecognizedCount >= 3) {
                        transition('ending_neutral');
                    } else {
                        messageBox.textContent = unrecognizedCount >= 5
                            ? "I don't recognize that input. Type \"help\" for assistance."
                            : "I don't recognize that input.";
                    }
                }
            } else {
                transition(nextScene);
            }
        }

        const scenes = {

            // ── PHASE 1: CONNECTION ──────────────────────────────────────────────

            start: {
                message: 'CLASSIFIED TERMINAL - ACCESS GRANTED. IDENTIFY YOURSELF.',
                handler: (input) => {
                    if (input) { playerName = input; return 'password'; }
                    return null;
                }
            },
            password: {
                message: 'In order to log in, you must enter the correct password.',
                handler: (input) => {
                    startPwCycle();
                    const phase = pwPhases[pwPhase];
                    if (input.toLowerCase() === phase.accept) {
                        stopPwCycle();
                        return 'name_entry';
                    }
                    qAttempts.pw = (qAttempts.pw || 0) + 1;
                    const punct = qAttempts.pw >= 10 ? '!' : '.';
                    setHint(phase.hint + punct);
                    return null;
                }
            },
            name_entry: {
                message: [
                    'Welcome, [name].',
                    'This terminal contains restricted files.',
                    'There has been an incident in Millhaven Creek, PA.',
                    'Do you want to proceed?'
                ],
                handler: (input) => {
                    const a = analyzeAgreement(input);
                    if (a.mood === 'agrees') return 'warning';
                    if (a.mood === 'disagrees') return 'denied';
                    return null;
                }
            },
            denied: {
                instant: true,
                message: 'Access requires your consent. Do you want to proceed?',
                handler: (input) => {
                    const a = analyzeAgreement(input);
                    if (a.mood === 'agrees') return 'warning';
                    if (a.mood === 'disagrees') return 'denied';
                    return null;
                }
            },
            warning: {
                message: [
                    'WARNING: These files document evidence of a federal crime.',
                    'Viewing them may implicate you.',
                    'Do you understand?'
                ],
                handler: (input) => {
                    const a = analyzeAgreement(input);
                    if (a.mood === 'agrees') return 'briefing_1';
                    return null;
                }
            },

            // ── PHASE 2: THE INCIDENT ─────────────────────────────────────────────

            briefing_1: {
                message: [
                    '1983. Millhaven Creek, Pennsylvania. Population: 4,200.',
                    'In June, the first cases appear.',
                    'Children with rashes. Headaches. Tumors.',
                    'What do you want to know?'
                ],
                handler: (input) => {
                    if (detectIntent(input, ['why', 'what', 'how', 'children', 'sick', 'happened', 'source', 'cause', 'tell', 'know', 'more', 'who']))
                        return 'hub_1';
                    return null;
                }
            },

            // HUB 1 - VICTIMS vs SOURCE (both required)
            hub_1: {
                message: () => {
                    const v = explored.has('victims_done');
                    const s = explored.has('source_done');
                    if (!v && !s)
                        return 'Two threads are open. You must examine both before moving on.\n\n→ VICTIMS - who got sick\n→ SOURCE - what caused it';
                    if (v && !s)
                        return 'Good. One thread remains.\n\n→ SOURCE - what caused the contamination';
                    return 'Good. One thread remains.\n\n→ VICTIMS - who was affected';
                },
                handler: (input) => {
                    const victimKeys = ['victim', 'sick', 'children', 'families', 'who got', 'affected', 'ill', 'disease', 'cancer', 'people'];
                    const sourceKeys = ['source', 'contamination', 'contaminated', 'cause', 'chemical', 'toxic', 'where', 'basin', 'benzene', 'poison'];

                    if (detectIntent(input, victimKeys)) {
                        if (!explored.has('victims_done')) return 'victims_a';
                        setHint("You've already examined the victims' story.\n\n→ Ask about the SOURCE.");
                        return null;
                    }
                    if (detectIntent(input, sourceKeys)) {
                        if (!explored.has('source_done')) return 'source_b';
                        setHint("You've already examined the contamination source.\n\n→ Ask about the VICTIMS.");
                        return null;
                    }
                    return null;
                }
            },

            victims_a: {
                autoAdvance: true,
                message: [
                    'Forty-seven residents filed complaints with the EPA between June and December 1983.',
                    'Children developed rashes, severe headaches, and tumor clusters.',
                    'Dr. Elaine Marsh catalogued 18 pediatric cancer diagnoses by early 1984.',
                    'The pattern was undeniable.'
                ],
                handler: () => 'victims_a2'
            },
            victims_a2: {
                autoAdvance: true,
                message: [
                    'Dr. Marsh submitted her findings to the county health board in February 1984.',
                    'Her report was returned marked "inconclusive."',
                    'She was told to retest. Funding was never provided.',
                    'Her career stalled. The children kept getting sick.'
                ],
                handler: () => 'q1_children'
            },

            source_b: {
                autoAdvance: true,
                message: [
                    'The contamination traced back to groundwater movement from Vance Basin - an industrial site half a mile from the school.',
                    'Chemical seepage had been detectable since 1975.',
                    'Nobody tested for it until 1983, when a local journalist ordered the first independent analysis.'
                ],
                handler: () => 'source_b2'
            },
            source_b2: {
                autoAdvance: true,
                message: [
                    'The results:',
                    'Benzene: 2 ppm detected. EPA safe limit: 0.005 ppm. Four hundred times above threshold.',
                    'Trichloroethylene: 0.21 ppm detected. EPA limit: 0.005 ppm. Forty-two times above safe levels.',
                    'Dioxins: present at 600 times the federal safety limit.',
                    'The test cost forty dollars.',
                    'The EPA had been sitting on 47 complaints for six months.',
                    'One independent test. Forty dollars. Six months of silence.'
                ],
                handler: () => 'q2_groundwater'
            },

            epa_link: {
                autoAdvance: true,
                message: [
                    'The EPA had a file on Millhaven Creek - 47 complaints, logged and shelved.',
                    'Someone made sure they stayed there.',
                    'But that thread leads elsewhere.',
                    'What matters now: Caldwell Chemical knew long before any of this.',
                    'There was a man named Raymond Holt.'
                ],
                handler: () => 'hub_2'
            },

            // ── PHASE 3: HOLT & THE LAND ─────────────────────────────────────────

            // HUB 2 - HOLT vs LAND SALE (both required)
            hub_2: {
                message: () => {
                    const h = explored.has('holt_done');
                    const l = explored.has('land_done');
                    if (!h && !l)
                        return 'Two leads. Both must be followed before you can act.\n\n→ HOLT - the chemist who tried to warn them\n→ LAND SALE - how toxic ground became a school playground';
                    if (h && !l)
                        return 'One lead remains.\n\n→ LAND SALE - how the contaminated site ended up under a school';
                    return 'One lead remains.\n\n→ HOLT - the man who tried to stop this';
                },
                handler: (input) => {
                    const holtKeys = ['holt', 'raymond', 'chemist', 'employee', 'worker', 'man who'];
                    const landKeys = ['land', 'sale', 'sold', 'school', 'deed', 'district', 'playground', 'dollar', 'purchase'];

                    if (detectIntent(input, holtKeys)) {
                        if (!explored.has('holt_done')) return 'holt_a';
                        setHint("You've already followed Holt's story.\n\n→ Ask about the LAND SALE.");
                        return null;
                    }
                    if (detectIntent(input, landKeys)) {
                        if (!explored.has('land_done')) return 'land_b';
                        setHint("You've already examined the land sale.\n\n→ Ask about HOLT.");
                        return null;
                    }
                    return null;
                }
            },

            holt_a: {
                autoAdvance: true,
                message: [
                    'Raymond Holt, 29, junior chemist at Caldwell Chemical.',
                    'In 1979, routine testing near Vance Basin produced results that alarmed him.',
                    'Benzene: 2 ppm. The EPA safe limit: 0.005 ppm.',
                    'Four hundred times the legal threshold. Documented. Dated. Signed.',
                    'He wrote a 14-page internal report and submitted it up the chain.'
                ],
                handler: () => 'holt_a2'
            },
            holt_a2: {
                autoAdvance: true,
                message: [
                    'Holt submitted the report to his supervisor, Gerald Tate.',
                    'Six weeks later, Holt was terminated. Reason: insubordination.',
                    'Tate kept his job and was promoted the following year.',
                    "Holt's report was reclassified as internal Caldwell property - sealed, inaccessible.",
                    'Holt spent years trying to recover it. He never did.'
                ],
                handler: () => 'q3_limits'
            },

            land_b: {
                autoAdvance: true,
                message: [
                    'In 1968, Caldwell Chemical sold the Vance Basin site to the Millhaven School District for one dollar.',
                    'The deed contained a liability waiver - Caldwell bore no legal responsibility for anything underground.',
                    "The school district's own attorney flagged the low price and the clause."
                ],
                handler: () => 'land_b2'
            },
            land_b2: {
                autoAdvance: true,
                message: [
                    "The attorney's objection was overruled by the superintendent - who had received a personal donation from a Caldwell board member the previous year.",
                    'Millhaven Elementary opened in 1972. 231 students enrolled.',
                    'By 1984, 18 of them had been diagnosed with leukemia.'
                ],
                handler: () => { explored.add('land_done'); return 'hub_2'; }
            },

            epa_deeper: {
                autoAdvance: true,
                message: [
                    'Both threads connect.',
                    "Holt's suppressed report. A corrupted land sale.",
                    'And at the center of both: Director H. Crane.',
                    'There is more to find - on Crane himself, and on the board that backed him unanimously.'
                ],
                handler: () => 'hub_3'
            },

            // ── PHASE 4: THE COVER-UP ────────────────────────────────────────────

            // HUB 3 - CRANE vs THE BOARD (both required)
            hub_3: {
                message: () => {
                    const c = explored.has('crane_done');
                    const b = explored.has('board_done');
                    if (!c && !b)
                        return 'Two more paths. You need both before you can act.\n\n→ CRANE - the director who signed everything\n→ THE BOARD - the seven who voted in silence';
                    if (c && !b)
                        return 'One path remains.\n\n→ THE BOARD - the seven who voted unanimously';
                    return 'One path remains.\n\n→ CRANE - the man at the center of it all';
                },
                handler: (input) => {
                    const craneKeys = ['crane', 'director', 'h crane', 'h.', 'signed'];
                    const boardKeys = ['board', 'seven', 'vote', 'executives', 'members', 'who else', 'others'];

                    if (detectIntent(input, craneKeys)) {
                        if (!explored.has('crane_done')) return 'crane_a';
                        setHint("You've already followed Crane's trail.\n\n→ Ask about THE BOARD.");
                        return null;
                    }
                    if (detectIntent(input, boardKeys)) {
                        if (!explored.has('board_done')) return 'board_b';
                        setHint("You've already examined the board.\n\n→ Ask about CRANE.");
                        return null;
                    }
                    return null;
                }
            },

            crane_a: {
                autoAdvance: true,
                message: [
                    'H. Crane, Director of Operations at Caldwell Chemical, 1963-1971.',
                    "He personally reviewed Raymond Holt's report on March 14, 1968.",
                    'Three days later, he signed the deed transferring Vance Basin to the school district.',
                    'The timeline is exact. The choice was deliberate.'
                ],
                handler: () => 'crane_a2'
            },
            crane_a2: {
                autoAdvance: true,
                message: [
                    "Crane retired in 1971 with a full pension and a seat on a real estate trust's board.",
                    "In 1983, when Millhaven began attracting press attention, Crane donated $40,000 to the re-election campaign of Pennsylvania's EPA director.",
                    'The Millhaven investigation that year was quietly deprioritized.'
                ],

        hiddenInput.addEventListener('input', (e) => {
            if (sentencePager || pagerAwaitingEnter) {
                hiddenInput.value = '';
                return;
            }
            const text = e.target.value;
            const display = currentScene === 'password' ? '*'.repeat(text.length) : text;
            inputText.innerHTML = display + '<span class="cursor"></span>';
        });

        hiddenInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const wasPaging = !!sentencePager;
                if (skipTypewriter() && wasPaging) return; // pager: skip was the only action
                if (sentencePager) {
                    hiddenInput.value = '';
                    sentencePager.index++;
                    showPagerSentence();
                    return;
                }
                if (pagerAwaitingEnter) {
                    hiddenInput.value = '';
                    pagerAwaitingEnter = false;
                    inputText.innerHTML = '<span class="cursor"></span>';
                    hiddenInput.focus();
                    handleScene('.');
                    return;
                }
                const userInput = hiddenInput.value;
                hiddenInput.value = '';
                inputText.innerHTML = '<span class="cursor"></span>';
                handleScene(userInput);
            }
        });

        hiddenInput.focus();
        document.addEventListener('click', () => hiddenInput.focus());
    </script>
